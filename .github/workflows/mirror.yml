name: Mirror Eclipse Temurin Docker Images

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: read
  packages: write # Allows pushing to GitHub Container Registry

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Get all tags of eclipse-temurin
      run: |
        # Fetch the list of tags from the official eclipse-temurin Docker Hub repository
        curl -s https://registry.hub.docker.com/v2/repositories/library/eclipse-temurin/tags/?page_size=100 | jq -r '.results[].name' > tags.txt

    - name: Mirror images to GitHub Container Registry
      run: |
        while IFS= read -r tag; do
          src="eclipse-temurin:$tag"
          dest="ghcr.io/${{ github.repository_owner }}/eclipse-temurin:$tag"

          # Pull the image from Docker Hub
          docker pull $src
          
          # Tag the image for GitHub Container Registry
          docker tag $src $dest
          
          # Push the image to GitHub Container Registry
          docker push $dest
          
        done < tags.txt
