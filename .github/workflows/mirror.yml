name: Mirror Docker Images

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: read
  packages: write # Allows pushing to GitHub Container Registry

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Pull, tag, and push Docker images
      run: |
        # Specify the source Docker image (e.g., eclipse-temurin) and registry (e.g., ghcr.io)
        SOURCE_IMAGE="eclipse-temurin"
        TARGET_REGISTRY="ghcr.io/${{ github.repository_owner }}"
        
        # Pull all tags for the source image
        for tag in $(docker manifest inspect --insecure --verbose ${SOURCE_IMAGE} | jq -r '.manifests[].digest'); do
          echo "Processing tag: $tag"
          
          # Pull the image from Docker Hub
          docker pull ${SOURCE_IMAGE}:$tag
          
          # Tag the image for the target registry
          docker tag ${SOURCE_IMAGE}:$tag ${TARGET_REGISTRY}/${SOURCE_IMAGE}:$tag
          
          # Push the tagged image to the target registry
          docker push ${TARGET_REGISTRY}/${SOURCE_IMAGE}:$tag
        done
