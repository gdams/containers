name: Mirror Eclipse Temurin Docker Images

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: read
  packages: write # Allows pushing to GitHub Container Registry

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

    - name: Set up Docker Buildx
      run: |
        docker run --privileged --rm tonistiigi/binfmt --install all
        docker buildx create --use

    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Download Eclipse Temurin manifest file
      run: wget https://raw.githubusercontent.com/docker-library/official-images/master/library/eclipse-temurin -O eclipse-temurin-manifest

    - name: Parse manifest file and mirror images
      run: |
        # Extract the relevant sections from the manifest file
        awk '/^Tags: / {tags=$0} /^Architectures: / {arch=$0} /^Directory: / {dir=$0; print tags, arch, dir}' eclipse-temurin-manifest | while read -r line; do
          tags=$(echo $line | awk '{print $2}')
          archs=$(echo $line | awk '{print $4}')
          dir=$(echo $line | awk '{print $6}')

          # Convert the tags and architectures into arrays
          IFS=',' read -r -a tag_array <<< "$tags"
          IFS=',' read -r -a arch_array <<< "$archs"

          # Loop through each tag
          for tag in "${tag_array[@]}"; do
            src="eclipse-temurin:$tag"
            dest="ghcr.io/${{ github.repository_owner }}/eclipse-temurin:$tag"

            # Loop through each architecture
            for arch in "${arch_array[@]}"; do
              platform="linux/$arch"
              if [[ "$arch" == "windows-amd64" ]]; then
                platform="windows/amd64"
              fi

              # Pull, tag, and push each architecture-specific image
              docker pull --platform=$platform $src
              docker tag $src $dest-$arch
              docker push $dest-$arch
            done

            # Create and push a multi-platform manifest
            docker manifest create $dest \
              $(for arch in "${arch_array[@]}"; do echo "$dest-$arch"; done)

            docker manifest push $dest
          done
        done
