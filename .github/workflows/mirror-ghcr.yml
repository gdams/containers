name: Mirror to GHCR

on:
  workflow_dispatch:

permissions: read-all

jobs:
  mirror:
    permissions:
      packages: write
    if: startsWith(github.repository, 'gdams/')
    runs-on: ubuntu-latest
    steps:
      - uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5

      - name: Mirror images to GHCR
        env:
          SOURCE: docker.io/library/eclipse-temurin
          TARGET: ghcr.io/${{ github.repository_owner }}/eclipse-temurin
        run: |
          TAGS=$(crane ls "$SOURCE")
          echo "Found $(echo "$TAGS" | wc -l | tr -d ' ') tags to mirror"

          FAILED=0
          for TAG in $TAGS; do
            echo "Copying $TAG ..."
            crane copy "$SOURCE:$TAG" "$TARGET:$TAG" || FAILED=$((FAILED + 1))
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "$FAILED tag(s) failed to copy"
            exit 1
          fi
