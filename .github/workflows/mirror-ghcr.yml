name: Mirror to GHCR

on:
  workflow_dispatch:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"

permissions: read-all

jobs:
  mirror:
    permissions:
      packages: write
    if: startsWith(github.repository, 'adoptium/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # v0.5

      - name: Mirror images to GHCR
        env:
          SOURCE: docker.io/library/eclipse-temurin
          TARGET: ghcr.io/${{ github.repository_owner }}/eclipse-temurin
        run: |
          # Extract all tags from non-Windows manifest blocks
          TAGS=$(awk -v RS='\n\n' '!/windows-amd64/' eclipse-temurin \
            | grep -E '^(Shared)?Tags:' \
            | sed 's/^[^:]*: //' \
            | tr ',' '\n' \
            | tr -d ' ' \
            | sort -u)

          echo "Found $(echo "$TAGS" | wc -l | tr -d ' ') unique tags to mirror"
          FAILED=0
          for TAG in $TAGS; do
            echo "Copying $TAG ..."
            crane copy "$SOURCE:$TAG" "$TARGET:$TAG" || FAILED=$((FAILED + 1))
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "$FAILED tag(s) failed to copy"
            exit 1
          fi
